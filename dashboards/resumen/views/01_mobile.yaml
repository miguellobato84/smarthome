type: sections
path: mobile
max_columns: 4
title: Mobile
sections:
- type: grid
  cards:
  - type: heading
    heading: Scenes
    heading_style: title
    badges: []
  - type: custom:mushroom-template-card
    primary: Morning
    secondary: Turn on the day scene
    icon: mdi:lamps
    icon_color: amber
    tap_action:
      action: call-service
      service: scene.turn_on
      target:
        entity_id: scene.ambiente_on
  - type: custom:mushroom-template-card
    primary: Sleep
    secondary: Turn off the day scene
    icon: mdi:lightbulb-night
    icon_color: indigo
    tap_action:
      action: call-service
      service: scene.turn_on
      target:
        entity_id: scene.ambiente_off
  - type: tile
    entity: weather.forecast_majadahonda
    name: Forecast
    vertical: false
    features_position: bottom
  - type: tile
    entity: sensor.majadahonda_temperatura
    name: Outside temperature
    vertical: false
    features_position: bottom
  column_span: 4
- type: grid
  cards:
  - type: heading
    heading: Helpers
    heading_style: title
    badges: []
  - type: custom:mushroom-template-card
    entity: input_boolean.enable_radiators
    primary: "{{ 'Radiators enabled' if is_state(entity, 'on') else 'Radiators disabled' }}"
    icon: "{{ 'mdi:radiator' if is_state(entity, 'on') else 'mdi:radiator-disabled' }}"
    icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
  - type: custom:mushroom-template-card
    entity: input_boolean.is_holiday
    primary: "{{ 'Holiday' if is_state(entity, 'on') else 'Workday' }}"
    icon: "{{ 'mdi:beach' if is_state(entity, 'on') else 'mdi:briefcase' }}"
    icon_color: "{{ 'green' if is_state(entity, 'on') else 'blue' }}"
    tap_action:
      action: toggle
  - type: tile
    entity: input_datetime.alarm
    name: Alarm
    vertical: false
    features_position: bottom
  - type: tile
    entity: input_datetime.go_to_school
    name: School run
    vertical: false
    features_position: bottom
  - type: tile
    entity: input_datetime.go_to_bed
    name: Bedtime
    vertical: false
    features_position: bottom
  - type: tile
    entity: input_number.max_temp
    name: Max temperature
    vertical: false
    features_position: bottom
  column_span: 4
- type: grid
