header:
  layout: center
  badges_position: top
  badges_wrap: scroll
badges:
- type: custom:mushroom-template-badge
  entity: input_boolean.enable_radiators
  icon: |
    {% if is_state('input_boolean.enable_radiators', 'on') %}
      mdi:radiator
    {% else %}
      mdi:radiator-disabled
    {% endif %}
  content: |
    {% if is_state('input_boolean.enable_radiators', 'on') %}
      Heating on
    {% else %}
      Heating off
    {% endif %}
  tap_action:
    action: toggle
  color: |
    {% if is_state('input_boolean.enable_radiators', 'on') %}
      green
    {% else %}
      red
    {% endif %}
- type: custom:mushroom-template-badge
  entity: input_boolean.is_holiday
  icon: |
    {% if is_state('input_boolean.is_holiday', 'on') %}
      mdi:palm-tree
    {% else %}
      mdi:calendar-remove
    {% endif %}
  content: |
    {% if is_state('input_boolean.is_holiday', 'on') %}
      Holiday
    {% else %}
      Workday
    {% endif %}
  tap_action:
    action: toggle
  color: |
    {% if is_state('input_boolean.is_holiday', 'on') %}
      green
    {% else %}
      amber
    {% endif %}
- type: custom:mushroom-template-badge
  entity: input_number.max_temp
  icon: mdi:thermometer
  content: "{{ states('input_number.max_temp') }} °C"
  color: |
    {% set temp = states('input_number.max_temp') | float(0) %}
    {% if temp < 20 %}
      blue
    {% elif temp <= 21.5 %}
      amber
    {% else %}
      red
    {% endif %}
  tap_action:
    action: more-info
