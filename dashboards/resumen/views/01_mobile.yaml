- type: grid
  cards:
  - type: heading
    heading: Automations
    heading_style: title
    badges: []
  - type: custom:mushroom-template-card
    entity: automation.auto_radiadores
    primary: Radiators schedule
    secondary: "{% set last = state_attr(entity, 'last_triggered') %}Last triggered: {{ as_timestamp(last) | timestamp_custom('%d/%m %H:%M') if last else 'never' }}"
    icon: mdi:radiator
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.auto_radiadores
  - type: custom:mushroom-template-card
    entity: automation.ac_heat_schedule
    primary: AC heating
    secondary: |-
      {% set alarm = states('input_datetime.alarm') %}
      {% if alarm in ['unknown', 'unavailable', 'none', ''] %}
        Turns on 35 min before the alarm
      {% else %}
        {% set off = today_at(alarm) %}
        {% set on = off - timedelta(minutes=35) %}
        {{ on.strftime('%H:%M') }} -> {{ off.strftime('%H:%M') }}
      {% endif %}
    icon: mdi:radiator
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.ac_heat_schedule
  - type: custom:mushroom-template-card
    entity: automation.ambiente
    primary: Ambient scenes
    secondary: |-
      {% set morning_on = states('input_datetime.alarm') %}
      {% set morning_off = states('input_datetime.go_to_school') %}
      {% set night_off = states('input_datetime.go_to_bed') %}
      {% set sunset = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
      {% if morning_on in ['unknown', 'unavailable', 'none', ''] or morning_off in ['unknown', 'unavailable', 'none', ''] or night_off in ['unknown', 'unavailable', 'none', ''] or sunset is none %}
        Hours unavailable
      {% else %}
        {{ morning_on[0:5] }} -> {{ morning_off[0:5] }} / {{ sunset | timestamp_custom('%H:%M') }} -> {{ night_off[0:5] }}
      {% endif %}
    icon: mdi:theme-light-dark
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.ambiente
  - type: custom:mushroom-template-card
    entity: automation.luz_estudio
    primary: Office light by presence
    secondary: Turns on with occupancy during the day and turns off after 5 min away.
    icon: mdi:desk-lamp
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
