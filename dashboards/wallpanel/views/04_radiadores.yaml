type: sections
max_columns: 4
title: heating
path: calefaccion
sections:
- type: grid
  cards:
  - type: heading
    heading: Heating
    heading_style: title
    badges: []
  - type: custom:mushroom-template-card
    primary: Back
    icon: mdi:arrow-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/0
  - type: custom:mushroom-template-card
    entity: input_boolean.enable_radiators
    primary: "{{ 'Radiators enabled' if is_state(entity, 'on') else 'Radiators disabled' }}"
    icon: "{{ 'mdi:radiator' if is_state(entity, 'on') else 'mdi:radiator-disabled' }}"
    icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
  - type: custom:mushroom-template-card
    entity: automation.ac_heat_schedule
    primary: AC heating
    secondary: |-
      {% set alarm = states('input_datetime.alarm') %} {% if alarm in ['unknown', 'unavailable', 'none', ''] %}
        Turns on 35 min before the alarm, turns off at alarm time
      {% else %}
        {% set off = today_at(alarm) %}
        {% set on = off - timedelta(minutes=35) %}
        {{ on.strftime('%H:%M') }} -> {{ off.strftime('%H:%M') }}
      {% endif %}
    icon: mdi:radiator
    color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.ac_heat_schedule
  column_span: 4
- type: grid
  cards:
  - type: heading
    heading: Bedroom
    heading_style: subtitle
  - type: custom:mushroom-template-card
    entity: climate.radiador_dormitorio
    primary: >-
      {% set heating = state_attr(entity, 'hvac_action') == 'heating' and states(entity) not in ['off', 'unknown', 'unavailable'] %}
      {% set valve = states('number.radiador_dormitorio_valve_opening_degree') if heating else (100 - states('number.radiador_dormitorio_valve_closing_degree') | float(0)) | round(0) %}
      Status {{ state_attr(entity, 'hvac_action') or 'idle' }}, valve {{ valve }}%
    secondary: >-
      Room {{ state_attr(entity, 'current_temperature') }}°C, On 18 - 20
    icon: mdi:radiator
    icon_color: |-
      {% set mode = states(entity) %}
      {% set a = state_attr(entity, 'hvac_action') %}
      {% if a == 'heating' and mode not in ['off', 'unknown', 'unavailable'] %}
        red
      {% else %}
        gray
      {% endif %}
    multiline_secondary: true
  - type: custom:mushroom-template-card
    entity: input_boolean.radiador_dormitorio_auto
    primary: Bedroom smart
    secondary: |-
      {% if is_state(entity, 'off') %}
        Off · {{ relative_time(states[entity].last_changed) }}
      {% else %}
        On
      {% endif %}
    icon: mdi:creation
    icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
  - type: tile
    entity: input_number.radiador_dormitorio_target
    name: Bedroom target
    features_position: bottom
