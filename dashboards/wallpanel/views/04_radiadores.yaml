    multiline_secondary: true
  - type: tile
    entity: input_boolean.radiador_dario_auto
    name: Smart Darío
    icon: mdi:creation
    features_position: bottom
  - type: tile
    entity: input_number.radiador_dario_target
    name: Target Darío
    features_position: bottom
  - type: heading
    heading: Estudio
    heading_style: subtitle
  - type: custom:mushroom-template-card
    entity: climate.radiador_estudio
    primary: Radiador estudio
    secondary: >
      Actual {{ state_attr(entity, 'current_temperature') }}°C · Set {{
      state_attr(entity, 'temperature') }}°C · {{ state_attr(entity, 'hvac_action')
      or 'idle' }}
    icon: mdi:radiator
    icon_color: |-
      {% set mode = states(entity) %}
      {% set a = state_attr(entity, 'hvac_action') %}
      {% if a == 'heating' and mode not in ['off', 'unknown', 'unavailable'] %}
        red
      {% else %}
        gray
      {% endif %}
    multiline_secondary: true
  - type: tile
    entity: input_boolean.radiador_estudio_auto
    name: Smart estudio
    icon: mdi:creation
    features_position: bottom
  - type: tile
    entity: input_number.radiador_estudio_target
    name: Target estudio
    features_position: bottom
  - type: heading
