type: sections
max_columns: 4
title: calefaccion
path: calefaccion
sections:
- type: grid
  cards:
  - type: heading
    heading: Calefaccion
    heading_style: title
    badges: []
  - type: custom:mushroom-template-card
    primary: Volver
    icon: mdi:arrow-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/0
  - type: custom:mushroom-template-card
    entity: automation.auto_radiadores
    primary: Radiadores
    secondary: "{% set last = state_attr(entity, 'last_triggered') %}last triggered:
      {{ as_timestamp(last) | timestamp_custom('%d/%m %H:%M') if last else 'never' }}"
    icon: mdi:radiator-disabled
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.auto_radiadores
  - type: custom:mushroom-template-card
    entity: automation.auto_radiadores_automation
    primary: Horario Radiadores
    secondary: Activa auto_radiadores a las 17:00 y la desactiva a las 22:00.
    icon: mdi:clock-outline
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.auto_radiadores_automation
  - type: custom:mushroom-template-card
    entity: automation.ac_heat_schedule
    primary: AC calefaccion
    secondary: |-
      {% set alarm = states('input_datetime.alarm') %} {% if alarm in ['unknown', 'unavailable', 'none', ''] %}
        Enciende 35 min antes de la alarma, apaga a la hora de la alarma
      {% else %}
        {% set off = today_at(alarm) %}
        {% set on = off - timedelta(minutes=35) %}
        {{ on.strftime('%H:%M') }} -> {{ off.strftime('%H:%M') }}
      {% endif %}
    icon: mdi:radiator
    color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.ac_heat_schedule
  column_span: 4
- type: grid
  cards:
  - type: heading
    heading: Dormitorio
    heading_style: subtitle
  - type: custom:mushroom-template-card
    entity: climate.radiador_dormitorio
    primary: Radiador dormitorio
    secondary: >
      Actual {{ state_attr(entity, 'current_temperature') }}°C · Set {{
      state_attr(entity, 'temperature') }}°C · {{ state_attr(entity, 'hvac_action')
      or 'idle' }}
    icon: mdi:radiator
    icon_color: |-
      {% set mode = states(entity) %}
      {% set a = state_attr(entity, 'hvac_action') %}
      {% if a == 'heating' and mode not in ['off', 'unknown', 'unavailable'] %}
        red
      {% else %}
        gray
      {% endif %}
    multiline_secondary: true
  - type: tile
    entity: input_boolean.radiador_dormitorio_auto
    name: Smart dormitorio
    icon: mdi:creation
    features_position: bottom
  - type: tile
    entity: input_number.radiador_dormitorio_target
    name: Target dormitorio
    features_position: bottom
  - type: heading
    heading: Darío
    heading_style: subtitle
  - type: custom:mushroom-template-card
    entity: climate.radiador_dario
    primary: Radiador Darío
    secondary: >
      Actual {{ state_attr(entity, 'current_temperature') }}°C · Set {{
      state_attr(entity, 'temperature') }}°C · {{ state_attr(entity, 'hvac_action')
