type: sections
title: main
max_columns: 4
sections:
- type: grid
  cards:
  - type: picture-elements
    elements:
    - type: custom:streamline-card
      template: radiator_picture_mushroom
      variables:
      - entity: climate.radiador_dormitorio
      - temp_text: "{{ states('sensor.radiador_dormitorio_local_temperature') | float(0) | round(0) }}º"
      - icon: mdi:radiator
      - left: 10%
      - top: 32%
    - type: state-icon
      entity: light.tuya_ventilador_dormitorio
      icon: mdi:dome-light
      style:
        left: 10%
        top: 17%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: fan.tuya_ventilador_dormitorio
      style:
        left: 10%
        top: 24%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: custom:streamline-card
      template: radiator_picture_mushroom
      variables:
      - entity: climate.radiador_dario
      - temp_text: "{{ states('sensor.sensor_temp_dario_temperature') | float(0) | round(0) }}º"
      - icon: mdi:radiator
      - left: 25%
      - top: 32%
    - type: state-icon
      entity: light.tuya_ventilador_dario
      icon: mdi:dome-light
      style:
        left: 25%
        top: 17%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: fan.tuya_ventilador_dario
      style:
        left: 25%
        top: 24%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: switch.globo_dario
      icon: mdi:circle
      style:
        left: 20%
        top: 12%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: custom:streamline-card
      template: radiator_picture_mushroom
      variables:
      - entity: climate.radiador_estudio
      - temp_text: "{{ states('sensor.sensor_temp_estudio_temperature') | float(0) | round(0) }}º"
      - icon: mdi:radiator
      - left: 40%
      - top: 32%
    - type: state-icon
      entity: cover.persiana_estudio
      icon: mdi:blinds
      style:
        left: 40%
        top: 10%
        transform: translate(-50%, -50%)
      tap_action:
        action: more-info
    - type: state-icon
      entity: light.luz_estudio
      icon: mdi:desk-lamp
      style:
        left: 35%
        top: 20%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: switch.extractor_bano
      icon: mdi:fan
      style:
        left: 33%
        top: 58%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: custom:mushroom-template-card
      entity: sensor.sensor_temp_banod_temperature
      primary: |
        {{ states('sensor.sensor_temp_banod_temperature') | float(0) | round(0) }}º"
      icon: mdi:thermometer
      layout: horizontal
      tap_action:
        action: more-info
      style:
        left: 41%
        top: 55%
        transform: translate(-50%, -50%)
      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            padding: 0 !important;
            --icon-size: 22px;
          }
          .content {
            gap: 0px !important;
          }
          .container {
            gap: 0px !important;
          }
          ha-tile-info {
            margin-left: 0 !important;
          }
          ha-state-icon {
            margin-right: 0 !important;
          }
    - type: state-icon
      entity: switch.luz_donut
      icon: mdi:record-circle
      style:
        left: 52%
        top: 55%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: light.luz_sofa
      icon: mdi:lightbulb
      style:
        left: 52%
        top: 75%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: light.luz_abuelo
      icon: mdi:floor-lamp
      style:
        left: 52%
        top: 90%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: state-icon
      entity: light.luz_mouille
      icon: mdi:lightbulb
      style:
        left: 60%
        top: 90%
        transform: translate(-50%, -50%)
      tap_action:
        action: toggle
    - type: custom:streamline-card
      template: radiator_picture_mushroom
      variables:
      - entity: climate.melcloudhome_1986_5325
      - temp_text: "{{ state_attr(entity, 'temperature') | float(0) | round(0) }}º"
      - icon: mdi:air-filter
      - left: 70%
      - top: 85%
    - type: custom:streamline-card
      template: radiator_picture_mushroom
      variables:
      - entity: climate.radiador_entrada
      - temp_text: "{{ states('sensor.sensor_temp_salon_temperature') | float(0) | round(0) }}º"
      - icon: mdi:radiator
      - left: 70%
      - top: 35%
    - type: custom:streamline-card
      template: radiator_picture_mushroom
      variables:
      - entity: climate.radiador_salon
      - temp_text: "{{ states('sensor.sensor_temp_salon_temperature') | float(0) | round(0) }}º"
      - icon: mdi:radiator
      - left: 70%
      - top: 90%
    image: https://casa.miguellobato.com/local/casa3.png
    grid_options:
      columns: 15
      rows: 6
  - type: custom:mushroom-template-card
    primary: Federico
    icon: mdi:account
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/federico
    features_position: bottom
    grid_options:
      columns: 5
      rows: 1
  - type: custom:mushroom-template-card
    primary: Automations
    icon: mdi:robot
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/automations
    features_position: bottom
    grid_options:
      columns: 4
      rows: 1
  - type: custom:mushroom-template-card
    primary: Calefacción
    icon: mdi:radiator
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/calefaccion
    features_position: bottom
    grid_options:
      columns: 5
      rows: 1
  column_span: 4
