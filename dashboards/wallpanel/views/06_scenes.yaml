type: sections
max_columns: 4
title: scenes
path: scenes
sections:
- type: grid
  cards:
  - type: heading
    heading: Scenes
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/0
    icon: mdi:arrow-left
    heading_style: title
    card_mod:
      style: |
        ha-icon-next {
          display: none !important;
        }
  - type: custom:mushroom-template-card
    primary: Morning
    icon: mdi:weather-sunset-up
    tap_action:
      action: call-service
      service: scene.turn_on
      target:
        entity_id: scene.ambiente_on
    features_position: bottom
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    primary: Sleep
    icon: mdi:lightbulb-night
    tap_action:
      action: call-service
      service: scene.turn_on
      target:
        entity_id: scene.ambiente_off
    features_position: bottom
    grid_options:
      columns: 8
      rows: 1
  column_span: 4
cards: []
dense_section_placement: true
