type: sections
max_columns: 4
title: federico
path: federico
sections:
- type: grid
  cards:
  - type: heading
    heading: Federico
    heading_style: title
  - type: custom:mushroom-template-card
    primary: Volver
    icon: mdi:arrow-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/0
    grid_options:
      columns: 6
      rows: 1
  - type: tile
    entity: vacuum.federico
    features_position: bottom
    vertical: false
    state_content:
    - state
    - battery_level
  - type: custom:mushroom-template-card
    primary: Iniciar
    icon: mdi:play
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_start
    grid_options:
      columns: 6
      rows: 1
  - type: custom:mushroom-template-card
    primary: Volver base
    icon: mdi:home-map-marker
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_volver
    grid_options:
      columns: 6
      rows: 1
  - type: custom:mushroom-template-card
    primary: Localizar
    icon: mdi:map-marker-radius
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_location
    grid_options:
      columns: 6
      rows: 1
  - type: custom:mushroom-template-card
    primary: Limpieza
    icon: mdi:spray-bottle
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_limpieza
    grid_options:
      columns: 6
      rows: 1
  column_span: 4
- type: grid
  cards:
  - type: heading
    heading: Mapa manual por habitaciones
    heading_style: subtitle
  - type: custom:mushroom-template-card
    primary: Bañera
    icon: mdi:bathtub-outline
