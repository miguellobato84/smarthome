type: sections
max_columns: 4
title: federico
path: federico
sections:
- type: grid
  cards:
  - type: heading
    heading: Federico
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/0
    icon: mdi:arrow-left
    heading_style: title
    card_mod:
      style: |
        ha-icon-next {
          display: none !important;
        }
  - type: tile
    entity: vacuum.federico
    features_position: bottom
    vertical: false
    state_content:
    - state
    - battery_level
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    primary: Start
    icon: mdi:play
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_start
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    primary: Return to base
    icon: mdi:home-map-marker
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_volver
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    primary: Locate
    icon: mdi:map-marker-radius
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_location
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    primary: Cleaning
    icon: mdi:spray-bottle
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: script.federico_limpieza
    grid_options:
      columns: 8
      rows: 1
  column_span: 4
- type: grid
  cards:
  - type: heading
    heading: Manual room map
    heading_style: subtitle
  - type: custom:mushroom-template-card
    primary: Bathtub
    icon: mdi:bathtub-outline
    icon_color: blue
    tap_action:
      action: call-service
      service: script.turn_on
      data:
        variables:
          habitacion: banera
      target:
        entity_id: script.federico_habitacion
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    primary: Shower
    icon: mdi:shower
