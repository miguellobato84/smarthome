type: sections
max_columns: 3
title: automations
path: automations
sections:
- type: grid
  cards:
  - type: custom:mushroom-template-card
    primary: Volver
    icon: mdi:arrow-left
    features_position: bottom
    tap_action:
      action: navigate
      navigation_path: /dashboard-wallpanel/0
  - type: custom:mushroom-template-card
    entity: input_boolean.at_home
    primary: "{{ 'En casa' if is_state(entity, 'on') else 'Fuera de casa' }}"
    icon: "{{ 'mdi:home' if is_state(entity, 'on') else 'mdi:home-off' }}"
    icon_color: "{{ 'green' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: input_boolean.is_holiday
    primary: "{{ 'Día festivo' if is_state(entity, 'on') else 'Día laborable' }}"
    icon: "{{ 'mdi:beach' if is_state(entity, 'on') else 'mdi:briefcase' }}"
    icon_color: "{{ 'green' if is_state(entity, 'on') else 'blue' }}"
  - type: custom:mushroom-template-card
    entity: input_datetime.alarm
    primary: Alarma
    secondary: Programada a las {{ states('input_datetime.alarm')[0:5] }}
    icon: mdi:alarm
    icon_color: red
  - type: custom:mushroom-template-card
    entity: automation.ac_heat_schedule
    primary: AC calefaccion
    secondary: |-
      {% set alarm = states('input_datetime.alarm') %} {% if alarm in ['unknown', 'unavailable', 'none', ''] %}
        Enciende 35 min antes de la alarma, apaga a la hora de la alarma
      {% else %}
        {% set off = today_at(alarm) %}
        {% set on = off - timedelta(minutes=35) %}
        {{ on.strftime('%H:%M') }} -> {{ off.strftime('%H:%M') }}
      {% endif %}
    icon: mdi:radiator
    color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.ambiente
    primary: Escenas de ambiente
    secondary: Cambia escenas por horario cuando at_home esta activo.
    icon: mdi:theme-light-dark
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.armarios
    primary: Luces de armarios
    secondary: Enciende a las 08:00 y apaga a las 21:00.
    icon: mdi:wardrobe
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.auto_off_extractor_bano
    primary: Auto apagado extractor
    secondary: Apaga el extractor del bano tras 15 minutos encendido.
    icon: mdi:fan-off
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.autoenable_radiador_smart_mode
    primary: Reactivar modo smart radiador
    secondary: Si queda en manual, vuelve a auto tras 4 horas.
    icon: mdi:radiator
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.humidity_rise_extractor_bano
    primary: Extractor por humedad
    secondary: Enciende el extractor si la humedad sube por encima del promedio.
    icon: mdi:water-percent-alert
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.is_holiday
    primary: Estado festivo
    secondary: Marca festivo en fin de semana y laborable entre semana.
    icon: mdi:calendar-weekend
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.luz_estudio
    primary: Luz estudio por presencia
    secondary: Enciende por ocupacion con brillo segun hora y apaga sin presencia.
    icon: mdi:desk-lamp
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.radiadores_external
    primary: Control externo de radiadores
    secondary: Recalcula objetivos de radiadores por horario, presencia y estado de luces.
    icon: mdi:radiator-disabled
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.ventilador_dario
    primary: Ventilador Dario
    secondary: Encendido y luz del ventilador.
    icon: mdi:fan
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  - type: custom:mushroom-template-card
    entity: automation.ventilador_dormitorio
    primary: Ventilador dormitorio
    secondary: Encendido y luz del ventilador.
    icon: mdi:ceiling-fan
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
  column_span: 3
cards: []
dense_section_placement: true
