    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.ventilador_dormitorio
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    entity: automation.autoenable_radiador_smart_mode
    primary: Re-enable radiator smart mode
    secondary: Returns to auto after 4h
    icon: mdi:radiator
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.autoenable_radiador_smart_mode
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    entity: automation.auto_off_extractor_bano
    primary: Bathroom fan auto-off
    secondary: Off after 15 min
    icon: mdi:fan-off
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.auto_off_extractor_bano
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    entity: automation.armarios
    primary: Wardrobe lights
    secondary: "{{ states('input_datetime.alarm')[0:5] }} -> {{ states('input_datetime.go_to_bed')[0:5] }}"
    icon: mdi:wardrobe
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.armarios
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    entity: automation.humidity_rise_extractor_bano
    primary: Bathroom fan
    secondary: Humidity trigger
    icon: mdi:water-percent-alert
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.humidity_rise_extractor_bano
    grid_options:
      columns: 8
      rows: 1
  - type: custom:mushroom-template-card
    entity: automation.is_holiday
    primary: Holiday status
    secondary: Weekend -> holiday
    icon: mdi:calendar-weekend
    multiline_secondary: true
    icon_color: "{{ 'yellow' if is_state(entity, 'on') else 'red' }}"
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: call-service
      service: automation.trigger
      target:
        entity_id: automation.is_holiday
    grid_options:
      columns: 8
      rows: 1
  column_span: 3
cards: []
dense_section_placement: true
