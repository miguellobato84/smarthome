wallpanel:
  enabled: true
  hide_toolbar: true
  hide_sidebar: true
  fullscreen: false
  idle_time: 0
views:
- type: sections
  title: main
  max_columns: 4
  sections:
  - type: grid
    cards:
    - type: picture-elements
      elements:
      - type: custom:mushroom-template-card
        entity: climate.radiador_dormitorio
        primary: "{{ states('sensor.radiador_dormitorio_local_temperature') }}°C"
        icon: mdi:radiator
        layout: horizontal
        tap_action:
          action: more-info
        style:
          left: 10%
          top: 32%
          transform: translate(-50%, -50%)
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              box-shadow: none !important;
              border: none !important;
              padding: 0 !important;
              --icon-size: 22px;
            }
            ha-state-icon {
              color: {% if state_attr('climate.radiador_dormitorio', 'hvac_action') == 'heating' %}
                       red
                     {% else %}
                       gray
                     {% endif %} !important;
              margin-right: 0 !important;
            }
            .content {
              gap: 0px !important;
            }
            .container {
              gap: 0px !important;
            }
            ha-tile-info {
              margin-left: 0 !important;
            }
            ha-state-icon {
              margin-right: 0 !important;
            }
      - type: state-icon
        entity: light.tuya_ventilador_dormitorio
        icon: mdi:dome-light
        style:
          left: 10%
          top: 17%
          transform: translate(-50%, -50%)
        tap_action:
          action: toggle
      - type: state-icon
        entity: fan.tuya_ventilador_dormitorio
        style:
          left: 10%
          top: 24%
          transform: translate(-50%, -50%)
        tap_action:
          action: toggle
