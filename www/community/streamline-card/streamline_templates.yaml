radiator_picture_mushroom:
  element:
    type: custom:mushroom-template-card
    primary: '[[temp_text]]'
    entity: "[[entity]]"
    icon: "[[icon]]"
    layout: horizontal
    tap_action:
      action: none
    style:
      left: "[[left]]"
      top: "[[top]]"
      transform: translate(-50%, -50%)
    card_mod:
      style: |
        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
          padding: 0 !important;
          --icon-size: 22px;
        }
        .content {
          gap: 0px !important;
        }
        .container {
          gap: 0px !important;
        }
        ha-tile-info {
          margin-left: 0 !important;
        }
        ha-state-icon {
          margin-right: 0 !important;
        }
    icon_color: |-
      {% set a = state_attr("[[entity]]", "hvac_action") %}
      {% if a == "heating" %}
        red
      {% elif a == "cooling" %}
        blue
      {% else %}
        gray
      {% endif %}
  default:
  - icon: mdi:radiator
