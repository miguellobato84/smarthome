set_radiador:
  alias: Set Radiador
  description: Use radiator helpers to control heating state, target temperature, and valve opening
  mode: parallel
  fields:
    entity:
      description: Radiator entity (climate.*) or a list of entities
      example: climate.radiador_dormitorio
    heating:
      description: Whether the radiator should actively heat
      example: true
  variables:
    entities: "{{ [entity] if entity is string else entity }}"
    heating_requested: "{{ heating | default(false) | bool }}"
  sequence:
    - repeat:
        for_each: "{{ entities }}"
        sequence:
          - variables:
              clim_entity: "{{ repeat.item }}"
              auto_entity: >-
                {{ clim_entity | replace('climate.', 'input_boolean.') ~ '_auto' }}
              target_entity: >-
                {{ clim_entity | replace('climate.', 'input_number.') ~ '_target' }}
              target_helper_value: "{{ states(target_entity) | float(18) }}"
              t_act: "{{ state_attr(clim_entity, 'current_temperature') | float(0) }}"
              diff: "{{ target_helper_value - t_act }}"
              valve_entity: >-
                {{ clim_entity | replace('climate.', 'number.') ~ '_valve_opening_degree' }}
          - action: logbook.log
            data:
              name: Radiator Debug
              message: "Priority: global-off request > auto_entity off when heating requested > heating request > off | Entity: {{ clim_entity }}, Heating: {{ heating_requested }}, Auto Entity: {{ auto_entity }}, Target Entity: {{ target_entity }}, Target Helper Value: {{ target_helper_value }}, Current Temp: {{ t_act }}, Diff: {{ diff }}, Valve Entity: {{ valve_entity }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ heating_requested and is_state(auto_entity, 'off') }}"
                sequence:
                  # Smart mode off forces heat only when the caller is requesting heating.
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ clim_entity }}"
                    data:
                      hvac_mode: "heat"
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ clim_entity }}"
                    data:
                      temperature: "{{ target_helper_value }}"
                  - action: number.set_value
                    target:
                      entity_id: "{{ valve_entity }}"
                    data:
                      value: 100
              - conditions:
                  - condition: template
                    value_template: "{{ heating_requested and diff > 0 and diff < 1 }}"
                sequence:
                  # Lower heating demand still keeps the radiator in heat mode with a smaller valve opening.
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ clim_entity }}"
                    data:
                      hvac_mode: "heat"
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ clim_entity }}"
                    data:
                      temperature: "{{ target_helper_value }}"
                  - action: number.set_value
                    target:
                      entity_id: "{{ valve_entity }}"
                    data:
                      value: 50
              - conditions:
                  - condition: template
                    value_template: "{{ heating_requested and diff >= 1 }}"
                sequence:
                  # Normal heating request with smart mode on keeps the radiator in heat mode.
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ clim_entity }}"
                    data:
                      hvac_mode: "heat"
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ clim_entity }}"
                    data:
                      temperature: "{{ target_helper_value }}"
                  - action: number.set_value
                    target:
                      entity_id: "{{ valve_entity }}"
                    data:
                      value: 100
            default:
              # No heating request, or the global-disable branch asked to turn the radiator off.
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ clim_entity }}"
                data:
                  hvac_mode: "off"
