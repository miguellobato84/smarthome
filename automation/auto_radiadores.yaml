- id: '1763817999770'
  alias: auto_radiadores
  description: ''
  triggers:
    - trigger: time_pattern
      minutes: /30
    - trigger: state
      entity_id:
        - input_boolean.radiador_dormitorio_auto
        - input_boolean.radiador_dario_auto
        - input_boolean.radiador_estudio_auto
        - input_boolean.radiador_entrada_auto
        - input_boolean.radiador_salon_auto
    - trigger: state
      entity_id:
        - input_number.radiador_dormitorio_target
        - input_number.radiador_dario_target
        - input_number.radiador_estudio_target
        - input_number.radiador_entrada_target
        - input_number.radiador_salon_target
  conditions: []
  actions:
    - action: script.set_radiador_config
      data:
        option: external
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.at_home
              state: 'off'
          sequence:
            - action: script.set_radiador
              data:
                entity:
                  - climate.radiador_dormitorio
                  - climate.radiador_dario
                  - climate.radiador_estudio
                  - climate.radiador_entrada
                  - climate.radiador_salon
                heating: false
      default:
        - action: script.set_radiador
          data:
            entity: climate.radiador_dormitorio
            heating: "{{ 18 <= now().hour < 20 }}"
        - action: script.set_radiador
          data:
            entity: climate.radiador_dario
            heating: |
              {% set hour = now().hour %}
              {% if is_state('input_boolean.is_holiday', 'on') %}
                {{ 7 <= hour < 19 }}
              {% else %}
                {{ (7 <= hour < 9) or (17 <= hour < 20) }}
              {% endif %}
        - action: script.set_radiador
          data:
            entity: climate.radiador_estudio
            heating: "{{ not is_state('input_boolean.is_holiday', 'on') and 7 <= now().hour < 16 }}"
        - action: script.set_radiador
          data:
            entity: climate.radiador_entrada
            heating: "{{ 7 <= now().hour < 22 }}"
        - action: script.set_radiador
          data:
            entity: climate.radiador_salon
            heating: "{{ 7 <= now().hour < 22 }}"
  mode: single
